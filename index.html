<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Utility</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/js-time-utility/style.css" rel="stylesheet">
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container py-3">

  <!-- Settings Button -->
  <div class="d-flex justify-content-end mb-2">
    <button type="button" class="btn btn-outline-dark setting" data-bs-toggle="modal" data-bs-target="#settingsModal">Settings</button>
  </div>

  <!-- Settings Modal -->
  <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="settingsModalLabel">Clock Settings</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="darkModeSwitch">
            <label class="form-check-label fw-bold" for="darkModeSwitch">Dark Mode</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="digitalFontSwitch">
            <label class="form-check-label fw-bold" for="digitalFontSwitch">Digital Font</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="hideDateSwitch">
            <label class="form-check-label fw-bold" for="hideDateSwitch">Hide Date</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Clock Cards -->
  <div class="row g-3">

    <!-- Digital Clock -->
    <div class="col-12 col-md-4">
      <div class="card text-center shadow-sm p-3">
        <div class="card-header">
          <span class="badge rounded-pill bg-success">Clock</span>
        </div>
        <div class="card-body">
          <h5 id="clockCountry" class="mb-1"></h5>
          <h3 id="clockTime" class="fs-2 fs-sm-4"></h3>
          <h4 id="clockDate" class="fs-6 fs-sm-5"></h4>
        </div>
      </div>
    </div>

    <!-- Stopwatch -->
    <div class="col-12 col-md-4">
      <div class="card text-center shadow-sm p-3">
        <div class="card-header">
          <span class="badge rounded-pill bg-success">Stopwatch</span>
        </div>
        <div class="card-body">
          <h3 id="stopwatchTime" class="fs-2">00:00.00</h3>
          <h4 id="stopwatchDate" class="fs-6"></h4>
          <div class="d-flex flex-wrap gap-2 justify-content-center mt-2">
            <button id="startStopwatchBtn" class="btn btn-outline-primary btn-sm">Start</button>
            <button id="stopWatchBtn" class="btn btn-outline-danger btn-sm">Stop</button>
            <button id="resumeStopwatchBtn" class="btn btn-outline-secondary btn-sm">Resume</button>
            <button id="resetStopwatchBtn" class="btn btn-outline-dark btn-sm reset">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Alarm Clock -->
    <div class="col-12 col-md-4">
      <div class="card text-center shadow-sm p-3">
        <div class="card-header">
          <span class="badge rounded-pill bg-success">Alarm Clock</span>
        </div>
        <div class="card-body">
          <h3 id="alarmTime" class="fs-2"></h3>
          <h4 id="alarmDate" class="fs-6"></h4>
          <button id="setAlarmBtn" class="btn btn-outline-primary btn-sm mt-2">Set Alarm</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="/js-time-utility/script.js"></script>
</body>
</html>
